<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScribeRx Dictation Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="state-idle">
  <!-- Rounded Capsule Siri Container -->
  <div id="popup-container" class="popup-card">
    
    <!-- Header / Brand -->
    <div class="popup-header">
      <div class="brand">
        <span class="brand-title">ScribeRx</span>
      </div>
      <div id="hotkey-indicator" class="hotkey-hint">Listening...</div>
    </div>

    <!-- Liquid Aurora Visualization Area -->
    <div id="view-listening" class="state-view">
      <div class="canvas-container">
        <canvas id="sine-canvas" width="340" height="50"></canvas>
      </div>
    </div>

    <!-- Processing View -->
    <div id="view-processing" class="state-view">
      <div class="processing-glow-container">
        <div class="processing-pulse-glow"></div>
      </div>
      <div class="processing-status">Analyzing medical terminology...</div>
    </div>

    <!-- Review / Corrections View -->
    <div id="view-review" class="state-view">
      <div id="transcript-display" class="transcript-box">
        <!-- Dynamic tokens -->
      </div>
      <div id="alternatives-box" class="alternatives-container hidden">
        <div class="alt-label">Correct terms:</div>
        <div id="alt-chips" class="chips-row"></div>
      </div>
    </div>

  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
